<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homepage Builder Pro</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
margin:0;
font-family:"Segoe UI";
background:#f5f5f5;
}

.header{
height:160px;
background:linear-gradient(135deg,#0078d4,#00a2ff);
color:white;
display:flex;
align-items:flex-end;
padding:20px;
}

.header input{
font-size:40px;
font-weight:bold;
border:none;
background:transparent;
color:white;
outline:none;
width:100%;
}

.page{
max-width:900px;
margin:0 auto;
padding:20px;
background:white;
min-height:100vh;
}

.toolbar{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#0078d4;
color:white;
cursor:pointer;
}

button:hover{
background:#005a9e;
}

.block{
margin-bottom:10px;
}

.input{
width:100%;
padding:8px;
font-size:16px;
border:1px solid #ddd;
border-radius:6px;
outline:none;
}

img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

a{
color:#0078d4;
word-break:break-all;
}

</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* =========================
   STORAGE
========================= */
function getCode(){
return new URLSearchParams(location.search).get("code");
}

function save(code,data){
localStorage.setItem("page_"+code,JSON.stringify(data));
}

function load(code){
return JSON.parse(localStorage.getItem("page_"+code)||"null");
}

/* =========================
   BLOCKS
========================= */

function TextBlock({value,onChange}){

return(
<div className="block">
<input
className="input"
value={value}
onChange={(e)=>onChange(e.target.value)}
placeholder="テキスト"
/>
</div>
);

}

function UrlBlock({value,onChange}){

return(
<div className="block">
<input
className="input"
value={value}
onChange={(e)=>onChange(e.target.value)}
placeholder="URL"
/>

{value && value.startsWith("http") && (
<div style={{marginTop:6}}>
<a href={value} target="_blank">{value}</a>
</div>
)}

</div>
);

}

function ImageBlock({value,onChange}){

function upload(e){
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=()=>{
onChange(reader.result);
};
reader.readAsDataURL(file);
}

return(
<div className="block">

<input type="file" onChange={upload}/>

{value && (
<img src={value}/>
)}

</div>
);

}

/* =========================
   APP
========================= */
function App(){

const code=getCode();
const isView=!!code;

const saved=code?load(code):null;

const [title,setTitle]=React.useState(saved?.title||"My Page");
const [blocks,setBlocks]=React.useState(saved?.blocks||[
{type:"text",value:""}
]);

const [editing,setEditing]=React.useState(!isView);
const [publicUrl,setPublicUrl]=React.useState("");

/* =========================
   AUTO SAVE
========================= */
React.useEffect(()=>{
if(!code)return;
save(code,{title,blocks});
},[title,blocks]);

/* =========================
   E KEY SWITCH
========================= */
React.useEffect(()=>{

function onKey(e){

const el=document.activeElement;
const typing=
el &&
(el.tagName==="INPUT" ||
el.tagName==="TEXTAREA");

if(typing)return;

if(e.key.toLowerCase()==="e"){
setEditing(v=>!v);
}
}

window.addEventListener("keydown",onKey);
return ()=>window.removeEventListener("keydown",onKey);

},[]);

/* =========================
   UPDATE BLOCK
========================= */
function updateBlock(i,value){
const copy=[...blocks];
copy[i].value=value;
setBlocks(copy);
}

/* =========================
   ADD BLOCKS
========================= */
function addText(){
setBlocks([...blocks,{type:"text",value:""}]);
}

function addUrl(){
setBlocks([...blocks,{type:"url",value:""}]);
}

function addImage(){
setBlocks([...blocks,{type:"image",value:""}]);
}

/* =========================
   PUBLISH
========================= */
function publish(){

const newCode=code||Math.random().toString(36).slice(2);

save(newCode,{title,blocks});

const url=location.origin+location.pathname+"?code="+newCode;

setPublicUrl(url);
location.search="?code="+newCode;
}

/* =========================
   VIEW MODE
========================= */
if(isView && !editing){

return(
<div>

<div className="header">
<h1>{title}</h1>
</div>

<div className="page">

{blocks.map((b,i)=>{

if(b.type==="text"){
return <div key={i}>{b.value}</div>;
}

if(b.type==="url"){
return (
<div key={i}>
<a href={b.value} target="_blank">{b.value}</a>
</div>
);
}

if(b.type==="image"){
return (
<img key={i} src={b.value}/>
);
}

})}

</div>

</div>
);
}

/* =========================
   EDIT MODE
========================= */
return(
<div>

<div className="header">
<input
value={title}
onChange={e=>setTitle(e.target.value)}
/>
</div>

<div className="page">

<div className="toolbar">

<button onClick={addText}>テキスト</button>
<button onClick={addUrl}>URL</button>
<button onClick={addImage}>画像</button>
<button onClick={publish}>公開</button>

</div>

{blocks.map((b,i)=>{

if(b.type==="text"){
return (
<TextBlock
key={i}
value={b.value}
onChange={(v)=>updateBlock(i,v)}
/>
);
}

if(b.type==="url"){
return (
<UrlBlock
key={i}
value={b.value}
onChange={(v)=>updateBlock(i,v)}
/>
);
}

if(b.type==="image"){
return (
<ImageBlock
key={i}
value={b.value}
onChange={(v)=>updateBlock(i,v)}
/>
);
}

})}

{publicUrl && (
<div style={{marginTop:10,display:"flex",gap:10}}>
<input style={{flex:1}} value={publicUrl} readOnly/>
<button onClick={()=>{
navigator.clipboard.writeText(publicUrl);
alert("コピー");
}}>
コピー
</button>
</div>
)}

</div>

</div>
);

}

ReactDOM.createRoot(document.getElementById("root"))
.render(<App/>);

</script>

</body>
</html>
