<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Homepage Builder</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Fluent UI React -->
<script src="https://unpkg.com/@fluentui/react@8/dist/fluentui-react.min.js"></script>

<!-- Fluent UI Icons -->
<script src="https://unpkg.com/@fluentui/font-icons-mdl2@8/dist/fluentui-icons.min.js"></script>

<!-- Ably -->
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

html, body {
    margin: 0;
    padding: 0;
    background: #f3f3f3;
    font-family: "Segoe UI", sans-serif;
    min-height: 100%;
    -webkit-tap-highlight-color: transparent;
}

#root {
    min-height: 100vh;
}

* {
    box-sizing: border-box;
}

.topbar {
    position: sticky;
    top: 0;
    z-index: 999;
    height: 60px;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
}

.layout {
    width: calc(100% - 24px);
    max-width: 1450px;
    margin: 18px auto;
    display: flex;
    gap: 20px;
    align-items: start;
}

.sidebar {
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.preview-area {
    flex: 1;
}

.card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.card h2 {
    margin-top: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
}

.site {
    background: white;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 10px 28px rgba(0,0,0,0.12);
}

.header {
    height: 320px;
    position: relative;
    background-size: cover;
    background-position: center;
}

.header-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.55));
    display: flex;
    align-items: end;
    padding: 30px;
}

.header-title {
    color: white;
    font-size: 46px;
    font-weight: bold;
    outline: none;
}

.content {
    padding: 30px;
}

.description {
    font-size: 17px;
    line-height: 1.8;
    white-space: pre-wrap;
    outline: none;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap: 14px;
    margin-top: 24px;
}

.gallery-item {
    position: relative;
}

.gallery-item img {
    width: 100%;
    border-radius: 18px;
    max-height: 260px;
    object-fit: cover;
    user-select: none;
}

.delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    color: white;
    cursor: pointer;
}

.link-list,
.file-list {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.link-item,
.file-item {
    background: #f5f5f5;
    border-radius: 18px;
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.link-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.link-item {
    text-decoration: none;
    color: black;
}

.dropzone {
    border: 2px dashed #0078d4;
    border-radius: 18px;
    padding: 24px;
    text-align: center;
    color: #0078d4;
}

.publish-url {
    background: #0078d4;
    color: white;
    border-radius: 14px;
    padding: 14px;
    margin-top: 14px;
    word-break: break-all;
    font-size: 14px;
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999999;
    padding: 14px;
}

.modal {
    width: 430px;
    max-width: 100%;
    background: white;
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.25);
}

.mobile-edit-btn {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 99999;
}

@media (max-width: 1000px) {

    .layout {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
    }

    .header {
        height: 220px;
    }

    .header-title {
        font-size: 34px;
    }

    .content {
        padding: 20px;
    }

    .gallery {
        grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    }

}

</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

const {
    PrimaryButton,
    DefaultButton,
    TextField,
    Toggle,
    Icon
} = FluentUIReact;

const ABLY_API_KEY =
"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY";

const ably = new Ably.Realtime(ABLY_API_KEY);

function randomCode(length = 32) {

    const chars =
    "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let result = "";

    crypto.getRandomValues(new Uint32Array(length))
    .forEach(v => {
        result += chars[v % chars.length];
    });

    return result;

}

function App() {

    const params =
    new URLSearchParams(location.search);

    const code =
    params.get("code");

    const viewMode =
    !!code;

    const [title, setTitle] =
    React.useState("My Homepage");

    const [description, setDescription] =
    React.useState("ここを直接クリックして編集");

    const [headerImage, setHeaderImage] =
    React.useState("");

    const [headerColor, setHeaderColor] =
    React.useState("#0078d4");

    const [images, setImages] =
    React.useState([]);

    const [links, setLinks] =
    React.useState([]);

    const [files, setFiles] =
    React.useState([]);

    const [viewPassword, setViewPassword] =
    React.useState("");

    const [editPassword, setEditPassword] =
    React.useState("");

    const [requirePassword, setRequirePassword] =
    React.useState(false);

    const [locked, setLocked] =
    React.useState(false);

    const [passwordInput, setPasswordInput] =
    React.useState("");

    const [editUnlocked, setEditUnlocked] =
    React.useState(!viewMode);

    const [showEditLogin, setShowEditLogin] =
    React.useState(false);

    React.useEffect(() => {

        if (viewMode) {
            loadPage(code);
        }

    }, []);

    React.useEffect(() => {

        const keyHandler = (e) => {

            if (e.key.toLowerCase() === "e") {
                setShowEditLogin(true);
            }

        };

        window.addEventListener("keydown", keyHandler);

        return () => {
            window.removeEventListener("keydown", keyHandler);
        };

    }, []);

    async function loadPage(code) {

        try {

            const channel =
            ably.channels.get("homepage_" + code);

            const result =
            await channel.history({ limit: 1 });

            if (!result.items.length) {
                alert("ページが見つかりません");
                return;
            }

            const data =
            result.items[0].data;

            setTitle(data.title || "");
            setDescription(data.description || "");
            setHeaderImage(data.headerImage || "");
            setHeaderColor(data.headerColor || "#0078d4");
            setImages(data.images || []);
            setLinks(data.links || []);
            setFiles(data.files || []);
            setViewPassword(data.viewPassword || "");
            setEditPassword(data.editPassword || "");
            setRequirePassword(data.requirePassword || false);

            if (data.requirePassword) {
                setLocked(true);
            }

        } catch (e) {

            console.error(e);

            alert("読み込みエラー");

        }

    }

    async function publishPage() {

        try {

            const finalCode =
            code || randomCode();

            const data = {
                title,
                description,
                headerImage,
                headerColor,
                images,
                links,
                files,
                viewPassword,
                editPassword,
                requirePassword,
                updatedAt: Date.now()
            };

            const channel =
            ably.channels.get("homepage_" + finalCode);

            await channel.publish(
                "homepage",
                data
            );

            const url =
            "https://ayatocraft.github.io/homepagebuilder/index.html?code=" +
            finalCode;

            if (location.protocol !== "file:") {

                history.replaceState(
                    {},
                    "",
                    "?code=" + finalCode
                );

            }

            alert(
                "公開完了\n\n" + url
            );

        } catch (e) {

            console.error(e);

            alert("公開失敗");

        }

    }

    function uploadHeader(e) {

        const file =
        e.target.files[0];

        if (!file) return;

        const url =
        URL.createObjectURL(file);

        setHeaderImage(url);

    }

    function uploadImage(e) {

        const file =
        e.target.files[0];

        if (!file) return;

        const url =
        URL.createObjectURL(file);

        setImages(prev => [
            ...prev,
            url
        ]);

    }

    function uploadFile(e) {

        const file =
        e.target.files[0];

        if (!file) return;

        const reader =
        new FileReader();

        reader.onload = () => {

            setFiles(prev => [
                ...prev,
                {
                    name: file.name,
                    data: reader.result
                }
            ]);

        };

        reader.readAsDataURL(file);

    }

    function addLink() {

        const title =
        prompt("リンク名");

        if (!title) return;

        const url =
        prompt("URL");

        if (!url) return;

        setLinks(prev => [
            ...prev,
            {
                title,
                url
            }
        ]);

    }

    function removeImage(index) {

        setImages(prev =>
            prev.filter((_,i)=>i !== index)
        );

    }

    function moveImage(from, to) {

        const arr = [...images];

        const item = arr[from];

        arr.splice(from, 1);

        arr.splice(to, 0, item);

        setImages(arr);

    }

    function unlockView() {

        if (passwordInput === viewPassword) {
            setLocked(false);
        } else {
            alert("パスワードが違います");
        }

    }

    function unlockEditor(codeInput) {

        if (codeInput === editPassword) {

            setEditUnlocked(true);

            setShowEditLogin(false);

        } else {

            alert("編集パスコードが違います");

        }

    }

    if (locked) {

        return (

            <div className="overlay">

                <div className="modal">

                    <h2>
                        🔒 保護されたページ
                    </h2>

                    <p>
                        閲覧パスワードを入力
                    </p>

                    <TextField
                        type="password"
                        value={passwordInput}
                        onChange={(e,v)=>
                            setPasswordInput(v)
                        }
                    />

                    <div style={{height:16}} />

                    <PrimaryButton
                        text="表示"
                        onClick={unlockView}
                    />

                </div>

            </div>

        );

    }

    return (

        <div>

            <div className="topbar">

                <div className="brand">

                    <Icon iconName="Globe" />

                    Homepage Builder

                </div>

                {
                    !viewMode &&
                    <PrimaryButton
                        text="公開"
                        iconProps={{
                            iconName: "Upload"
                        }}
                        onClick={publishPage}
                    />
                }

                {
                    viewMode &&
                    editUnlocked &&
                    <PrimaryButton
                        text="保存"
                        iconProps={{
                            iconName: "Save"
                        }}
                        onClick={publishPage}
                    />
                }

            </div>

            <div className="layout">

                {
                    editUnlocked &&
                    <div className="sidebar">

                        <div className="card">

                            <h2>
                                <Icon iconName="Photo2" />
                                ヘッダー
                            </h2>

                            <input
                                type="file"
                                accept="image/*"
                                onChange={uploadHeader}
                            />

                            <div style={{height:14}} />

                            <TextField
                                label="ヘッダー色"
                                value={headerColor}
                                onChange={(e,v)=>
                                    setHeaderColor(v)
                                }
                            />

                        </div>

                        <div className="card">

                            <h2>
                                <Icon iconName="Picture" />
                                画像
                            </h2>

                            <div className="dropzone">

                                画像追加

                                <div style={{height:12}} />

                                <input
                                    type="file"
                                    accept="image/*"
                                    onChange={uploadImage}
                                />

                            </div>

                        </div>

                        <div className="card">

                            <h2>
                                <Icon iconName="Link" />
                                URLリンク
                            </h2>

                            <PrimaryButton
                                text="リンク追加"
                                iconProps={{
                                    iconName: "Add"
                                }}
                                onClick={addLink}
                            />

                        </div>

                        <div className="card">

                            <h2>
                                <Icon iconName="FabricFolder" />
                                ファイル配布
                            </h2>

                            <input
                                type="file"
                                onChange={uploadFile}
                            />

                        </div>

                        <div className="card">

                            <h2>
                                <Icon iconName="Lock" />
                                公開設定
                            </h2>

                            <Toggle
                                label="閲覧パスワード"
                                checked={requirePassword}
                                onChange={(e,v)=>
                                    setRequirePassword(v)
                                }
                            />

                            {
                                requirePassword &&
                                <>
                                    <div style={{height:12}} />

                                    <TextField
                                        label="閲覧パスワード"
                                        type="password"
                                        value={viewPassword}
                                        onChange={(e,v)=>
                                            setViewPassword(v)
                                        }
                                    />
                                </>
                            }

                            <div style={{height:12}} />

                            <TextField
                                label="編集パスコード"
                                type="password"
                                value={editPassword}
                                onChange={(e,v)=>
                                    setEditPassword(v)
                                }
                            />

                            {
                                code &&
                                <div className="publish-url">

                                    https://ayatocraft.github.io/homepagebuilder/index.html?code={code}

                                </div>
                            }

                        </div>

                    </div>
                }

                <div className="preview-area">

                    <div className="site">

                        <div
                            className="header"
                            style={{
                                background:
                                headerImage
                                ?
                                `url(${headerImage}) center/cover`
                                :
                                headerColor
                            }}
                        >

                            <div className="header-overlay">

                                <div
                                    className="header-title"
                                    contentEditable={editUnlocked}
                                    suppressContentEditableWarning
                                    onInput={(e)=>
                                        setTitle(
                                            e.target.innerText
                                        )
                                    }
                                >
                                    {title}
                                </div>

                            </div>

                        </div>

                        <div className="content">

                            <div
                                className="description"
                                contentEditable={editUnlocked}
                                suppressContentEditableWarning
                                onInput={(e)=>
                                    setDescription(
                                        e.target.innerText
                                    )
                                }
                            >
                                {description}
                            </div>

                            <div className="gallery">

                                {
                                    images.map((img,index)=>(

                                        <div
                                            key={index}
                                            className="gallery-item"
                                            draggable={editUnlocked}
                                            onDragStart={(e)=>{

                                                e.dataTransfer.setData(
                                                    "index",
                                                    index
                                                );

                                            }}
                                            onDragOver={(e)=>{

                                                e.preventDefault();

                                            }}
                                            onDrop={(e)=>{

                                                const from =
                                                Number(
                                                    e.dataTransfer.getData(
                                                        "index"
                                                    )
                                                );

                                                moveImage(
                                                    from,
                                                    index
                                                );

                                            }}
                                        >

                                            <img src={img} />

                                            {
                                                editUnlocked &&
                                                <button
                                                    className="delete-btn"
                                                    onClick={()=>
                                                        removeImage(index)
                                                    }
                                                >
                                                    <Icon iconName="Delete" />
                                                </button>
                                            }

                                        </div>

                                    ))
                                }

                            </div>

                            {
                                links.length > 0 &&
                                <div className="link-list">

                                    {
                                        links.map((link,index)=>(

                                            <a
                                                key={index}
                                                href={link.url}
                                                target="_blank"
                                                className="link-item"
                                            >

                                                <div className="link-left">

                                                    <Icon iconName="Link" />

                                                    {link.title}

                                                </div>

                                                <Icon iconName="NavigateExternalInline" />

                                            </a>

                                        ))
                                    }

                                </div>
                            }

                            {
                                files.length > 0 &&
                                <div className="file-list">

                                    {
                                        files.map((file,index)=>(

                                            <div
                                                key={index}
                                                className="file-item"
                                            >

                                                <div className="link-left">

                                                    <Icon iconName="Page" />

                                                    {file.name}

                                                </div>

                                                <a
                                                    href={file.data}
                                                    download={file.name}
                                                >

                                                    <PrimaryButton
                                                        text="DL"
                                                        iconProps={{
                                                            iconName: "Download"
                                                        }}
                                                    />

                                                </a>

                                            </div>

                                        ))
                                    }

                                </div>
                            }

                        </div>

                    </div>

                </div>

            </div>

            {
                viewMode &&
                !editUnlocked &&
                <div className="mobile-edit-btn">

                    <PrimaryButton
                        text="編集"
                        iconProps={{
                            iconName: "Edit"
                        }}
                        onClick={()=>
                            setShowEditLogin(true)
                        }
                    />

                </div>
            }

            {
                showEditLogin &&
                <EditLoginModal
                    onClose={()=>
                        setShowEditLogin(false)
                    }
                    onUnlock={unlockEditor}
                />
            }

        </div>

    );

}

function EditLoginModal({

    onClose,
    onUnlock

}) {

    const [code, setCode] =
    React.useState("");

    return (

        <div className="overlay">

            <div className="modal">

                <h2>
                    ✏️ 編集ログイン
                </h2>

                <p>
                    編集パスコードを入力
                </p>

                <TextField
                    type="password"
                    value={code}
                    onChange={(e,v)=>
                        setCode(v)
                    }
                />

                <div style={{
                    marginTop: 20,
                    display: "flex",
                    justifyContent: "end",
                    gap: 10
                }}>

                    <DefaultButton
                        text="閉じる"
                        onClick={onClose}
                    />

                    <PrimaryButton
                        text="ログイン"
                        iconProps={{
                            iconName: "Unlock"
                        }}
                        onClick={()=>
                            onUnlock(code)
                        }
                    />

                </div>

            </div>

        </div>

    );

}

ReactDOM.createRoot(
    document.getElementById("root")
).render(<App />);

</script>

</body>
</html>
