<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homepage Builder Stable Mobile</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f5f5f5;
}

.header{
height:140px;
background:linear-gradient(135deg,#0078d4,#00a2ff);
color:white;
display:flex;
align-items:flex-end;
padding:16px;
}

.header input{
font-size:28px;
font-weight:bold;
border:none;
background:transparent;
color:white;
outline:none;
width:100%;
}

.page{
max-width:800px;
margin:0 auto;
padding:16px;
background:white;
min-height:100vh;
}

.toolbar{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px;
}

button{
padding:8px 10px;
border:none;
border-radius:8px;
background:#0078d4;
color:white;
font-size:14px;
}

.input{
width:100%;
padding:10px;
font-size:16px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:8px;
}

img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

a{
color:#0078d4;
word-break:break-all;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:16px;
border-radius:12px;
width:90%;
max-width:400px;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;

/* =========================
   ABLY
========================= */
const ably = new Ably.Realtime(
"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY"
);

const channel = ably.channels.get("homepage-builder");

/* =========================
   UTIL
========================= */
function getCode(){
return new URLSearchParams(location.search).get("code");
}

function loadLocal(code){
return JSON.parse(localStorage.getItem("page_"+code)||"null");
}

function saveLocal(code,data){
localStorage.setItem("page_"+code,JSON.stringify(data));
}

/* =========================
   APP
========================= */
function App(){

const code = getCode();
const isView = !!code;

const saved = code ? loadLocal(code) : null;

const [title,setTitle]=React.useState(saved?.title||"My Page");
const [blocks,setBlocks]=React.useState(saved?.blocks||[
{type:"text",value:""}
]);

const [modal,setModal]=React.useState(null);

/* =========================
   LOAD FROM ABLY
========================= */
React.useEffect(()=>{

if(!code) return;

const handler=(msg)=>{
if(!msg.data) return;

saveLocal(code,msg.data);
setTitle(msg.data.title);
setBlocks(msg.data.blocks);
};

channel.subscribe("sync-"+code,handler);

return ()=>{
channel.unsubscribe("sync-"+code,handler);
};

},[]);

/* =========================
   SAVE LOCAL
========================= */
React.useEffect(()=>{
if(!code) return;
saveLocal(code,{title,blocks});
},[title,blocks]);

/* =========================
   KEYBOARD (E TOGGLE)
========================= */
React.useEffect(()=>{

function onKey(e){

const tag=document.activeElement?.tagName;
if(tag==="INPUT"||tag==="TEXTAREA")return;

if(e.key.toLowerCase()==="e"){
setModal(null);
}
}

window.addEventListener("keydown",onKey);
return ()=>window.removeEventListener("keydown",onKey);

},[]);

/* =========================
   UPDATE
========================= */
function update(i,val){
const copy=[...blocks];
copy[i].value=val;
setBlocks(copy);
}

/* =========================
   ADD
========================= */
function addText(){
setBlocks([...blocks,{type:"text",value:""}]);
}

function addUrl(){
setModal({
type:"url",
value:"",
onSave:(v)=>{
setBlocks([...blocks,{type:"url",value:v}]);
setModal(null);
}
});
}

function addImage(){
const input=document.createElement("input");
input.type="file";

input.onchange=(e)=>{
const file=e.target.files[0];
if(!file)return;

const r=new FileReader();
r.onload=()=>{
setBlocks([...blocks,{type:"image",value:r.result}]);
};
r.readAsDataURL(file);
};

input.click();
}

/* =========================
   PUBLISH
========================= */
function publish(){

const newCode = code || Math.random().toString(36).slice(2);

const data={title,blocks};

saveLocal(newCode,data);

/* Ably notify only */
channel.publish("sync-"+newCode,data);

location.search="?code="+newCode;
}

/* =========================
   VIEW MODE
========================= */
if(isView){

return e("div",null,
e("div",{className:"header"},
e("h2",null,title)
),
e("div",{className:"page"},
blocks.map((b,i)=>{

if(b.type==="text"){
return e("div",{key:i},b.value);
}

if(b.type==="url"){
return e("a",{key:i,href:b.value,target:"_blank"},b.value);
}

if(b.type==="image"){
return e("img",{key:i,src:b.value});
}

})
)
);
}

/* =========================
   EDIT MODE
========================= */
return e("div",null,

e("div",{className:"header"},
e("input",{
value:title,
onChange:e=>setTitle(e.target.value)
})
),

e("div",{className:"page"},

e("div",{className:"toolbar"},
e("button",{onClick:addText},"テキスト"),
e("button",{onClick:addUrl},"URL"),
e("button",{onClick:addImage},"画像"),
e("button",{onClick:publish},"公開")
),

blocks.map((b,i)=>{

if(b.type==="text"){
return e("input",{
key:i,
className:"input",
value:b.value,
onChange:e=>update(i,e.target.value)
});
}

if(b.type==="url"){
return e("input",{
key:i,
className:"input",
value:b.value,
onChange:e=>update(i,e.target.value)
});
}

if(b.type==="image"){
return e("img",{key:i,src:b.value});
}

})

),

modal && e("div",{className:"modal"},
e("div",{className:"modalBox"},

e("input",{
className:"input",
value:modal.value,
onChange:e=>modal.value=e.target.value
}),

e("button",{
onClick:()=>modal.onSave(modal.value)
},"OK")

)
)

);

}

ReactDOM.createRoot(document.getElementById("root"))
.render(e(App));

</script>

</body>
</html>
