<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homepage Builder Desktop</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@fluentui/react@8/dist/fluentui-react.min.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#1e1e1e;
font-family:"Segoe UI";
}

*{
box-sizing:border-box;
}

#root{
width:100%;
height:100%;
}

.desktop{
width:100%;
height:100%;
position:relative;
overflow:hidden;
}

.window{
position:absolute;
background:white;
border-radius:14px;
overflow:hidden;
display:flex;
flex-direction:column;
border:1px solid #cfcfcf;
box-shadow:0 10px 40px rgba(0,0,0,0.45);
}

.windowBar{
height:42px;
background:#f3f3f3;
border-bottom:1px solid #ddd;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
cursor:move;
user-select:none;
}

.windowTitle{
display:flex;
align-items:center;
gap:8px;
font-size:14px;
font-weight:600;
}

.windowBtns{
display:flex;
gap:4px;
}

.windowBtn{
width:32px;
height:28px;
border:none;
background:transparent;
border-radius:8px;
cursor:pointer;
}

.windowBtn:hover{
background:#e5e5e5;
}

.windowContent{
flex:1;
overflow:auto;
background:#f5f5f5;
}

.resize{
position:absolute;
right:0;
bottom:0;
width:16px;
height:16px;
cursor:nwse-resize;
}

.taskbar{
position:absolute;
left:0;
right:0;
bottom:0;
height:52px;
background:#202020;
display:flex;
align-items:center;
gap:8px;
padding:0 8px;
z-index:99999;
}

.startBtn{
width:46px;
height:40px;
border:none;
border-radius:10px;
background:#0078d4;
color:white;
cursor:pointer;
}

.taskBtn{
height:40px;
border:none;
border-radius:10px;
background:#303030;
color:white;
padding:0 12px;
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
}

.startMenu{
position:absolute;
left:8px;
bottom:60px;
width:260px;
background:#2c2c2c;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.45);
}

.startItem{
width:100%;
height:48px;
border:none;
background:transparent;
color:white;
display:flex;
align-items:center;
gap:10px;
padding:0 16px;
cursor:pointer;
}

.startItem:hover{
background:rgba(255,255,255,0.08);
}

.popup{
position:absolute;
width:420px;
background:white;
border-radius:14px;
overflow:hidden;
border:1px solid #ccc;
box-shadow:0 10px 40px rgba(0,0,0,0.45);
z-index:999999;
}

.popupBar{
height:42px;
background:#f3f3f3;
border-bottom:1px solid #ddd;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
cursor:move;
}

.popupContent{
padding:16px;
}

.site{
width:100%;
min-height:100%;
background:white;
}

.topbar{
height:60px;
background:white;
border-bottom:1px solid #ddd;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
position:sticky;
top:0;
z-index:10;
}

.header{
height:260px;
background:linear-gradient(135deg,#0078d4,#00a2ff);
position:relative;
}

.headerOverlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
display:flex;
align-items:end;
padding:32px;
}

.headerTitleInput{
font-size:52px;
font-weight:bold;
background:transparent;
border:none;
outline:none;
color:white;
width:100%;
}

.editor{
padding:40px;
min-height:700px;
background:white;
}

.editor textarea{
width:100%;
min-height:500px;
border:none;
outline:none;
font-size:20px;
line-height:1.8;
resize:none;
font-family:"Segoe UI";
}

.preview{
margin-top:24px;
padding-top:24px;
border-top:1px solid #ddd;
}

.preview img{
max-width:100%;
border-radius:10px;
margin-top:14px;
display:block;
}

.preview video{
max-width:100%;
border-radius:10px;
margin-top:14px;
display:block;
}

.downloadBtn{
display:inline-block;
padding:12px 16px;
border-radius:10px;
background:#0078d4;
color:white;
text-decoration:none;
margin-top:12px;
}

.tabs{
position:absolute;
left:0;
right:0;
top:0;
height:48px;
background:#202020;
display:flex;
align-items:center;
gap:6px;
padding:0 8px;
z-index:99999;
}

.tab{
height:34px;
border:none;
border-radius:10px;
background:#303030;
color:white;
padding:0 14px;
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
}

.tab.active{
background:#0078d4;
}

.tabView{
position:absolute;
left:0;
right:0;
top:48px;
bottom:0;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

const {
PrimaryButton,
TextField,
Checkbox,
Stack,
Icon
} = FluentUIReact;

const ably =
new Ably.Realtime(
"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY"
);

const channel =
ably.channels.get("homepage-builder");

function App(){

const [windows,setWindows] =
React.useState([
createBuilder(1)
]);

const [startOpen,setStartOpen] =
React.useState(false);

const [popup,setPopup] =
React.useState(null);

const [tabMode,setTabMode] =
React.useState(false);

const [activeTab,setActiveTab] =
React.useState(0);
const [viewMode,setViewMode] = React.useState(false);

React.useEffect(()=>{
const params = new URLSearchParams(location.search);
const code = params.get("code");

if(code){
setViewMode(true);
setTabMode(true); // 強制閲覧UI
}
},[]);

function createBuilder(id){

return{
id,
type:"builder",
title:`Homepage Builder (${id})`,
x:100,
y:80,
width:1000,
height:700,
minimized:false,
maximized:false,
z:id
};

}

function createMemo(){

return{
id:Date.now(),
type:"memo",
title:"Memo",
x:140,
y:100,
width:900,
height:600,
z:999
};

}

function updateWindow(id,data){

setWindows(prev=>
prev.map(w=>
w.id===id
?
{...w,...data}
:
w
)
);

}

function focusWindow(id){

const top =
Math.max(...windows.map(w=>w.z))+1;

updateWindow(id,{
z:top
});

}

function closeWindow(id){

setWindows(prev=>
prev.filter(w=>w.id!==id)
);

}

if(tabMode){

return(

<div
style={{
width:"100%",
height:"100%",
background:"#fff"
}}
>

<div className="tabs">

{

windows.map((w,i)=>(

<div
key={w.id}
style={{
display:"flex",
gap:"4px"
}}
>

<button
className={
"tab " +
(
activeTab===i
?
"active"
:
""
)
}
onClick={()=>
setActiveTab(i)
}
>
<Icon
iconName={
w.type==="memo"
?
"Edit"
:
"Globe"
}
/>
{w.title}
</button>

<button
className="tab"
onClick={()=>{
closeWindow(w.id);
}}
>
✕
</button>

</div>

))

}

<button
className="tab"
onClick={()=>{
setWindows(prev=>[
...prev,
createBuilder(prev.length+1)
]);
}}
>
＋
</button>

<button
className="tab"
onClick={()=>
setTabMode(false)
}
>
🗗
</button>

</div>

<div className="tabView">

{

windows[activeTab] &&

<WindowView
data={windows[activeTab]}
updateWindow={updateWindow}
focusWindow={focusWindow}
closeWindow={closeWindow}
setPopup={setPopup}
tabMode={true}
/>

}

</div>

</div>

);

}

return(

<div className="desktop">

{

windows
.sort((a,b)=>a.z-b.z)
.map(win=>(

!win.minimized &&

<WindowView
key={win.id}
data={win}
updateWindow={updateWindow}
focusWindow={focusWindow}
closeWindow={closeWindow}
setPopup={setPopup}
/>

))

}

{

popup &&

<Popup
popup={popup}
close={()=>
setPopup(null)
}
/>

}

<div className="taskbar">

<button
className="startBtn"
onClick={()=>
setStartOpen(!startOpen)
}
>
<Icon iconName="Globe"/>
</button>

{

startOpen &&

<div className="startMenu">

<button
className="startItem"
onClick={()=>{
setWindows(prev=>[
...prev,
createBuilder(prev.length+1)
]);
}}
>
<Icon iconName="Globe"/>
Homepage Builder
</button>

<button
className="startItem"
onClick={()=>{
setWindows(prev=>[
...prev,
createMemo()
]);
}}
>
<Icon iconName="Edit"/>
Memo
</button>

<button
className="startItem"
onClick={()=>
setTabMode(true)
}
>
<Icon iconName="BrowsePhotos"/>
タブモード
</button>

</div>

}

{

windows.map(win=>(

<button
key={win.id}
className="taskBtn"
onClick={()=>{
updateWindow(
win.id,
{
minimized:
!win.minimized
}
);
}}
>

<Icon
iconName={
win.type==="memo"
?
"Edit"
:
"Globe"
}
/>

{win.title}

</button>

))

}

</div>

</div>

);

}

function Popup({
popup,
close
}){

const [pos,setPos] =
React.useState({
x:popup.x,
y:popup.y
});

function drag(e){

const sx=e.clientX;
const sy=e.clientY;

const ox=pos.x;
const oy=pos.y;

function move(ev){

setPos({
x:ox+(ev.clientX-sx),
y:oy+(ev.clientY-sy)
});

}

function up(){

removeEventListener("mousemove",move);
removeEventListener("mouseup",up);

}

addEventListener("mousemove",move);
addEventListener("mouseup",up);

}

return(

<div
className="popup"
style={{
left:pos.x,
top:pos.y
}}
>

<div
className="popupBar"
onMouseDown={drag}
>

<div>{popup.title}</div>

<button
className="windowBtn"
onClick={close}
>
✕
</button>

</div>

<div className="popupContent">

{popup.content}

</div>

</div>

);

}

function WindowView({
data,
updateWindow,
focusWindow,
closeWindow,
setPopup,
tabMode
}){

function drag(e){

if(tabMode)return;

const sx=e.clientX;
const sy=e.clientY;

const ox=data.x;
const oy=data.y;

function move(ev){

updateWindow(
data.id,
{
x:ox+(ev.clientX-sx),
y:oy+(ev.clientY-sy)
}
);

}

function up(){

removeEventListener("mousemove",move);
removeEventListener("mouseup",up);

}

addEventListener("mousemove",move);
addEventListener("mouseup",up);

}

function resize(e){

e.stopPropagation();

if(tabMode)return;

const sx=e.clientX;
const sy=e.clientY;

const ow=data.width;
const oh=data.height;

function move(ev){

updateWindow(
data.id,
{
width:Math.max(
450,
ow+(ev.clientX-sx)
),
height:Math.max(
300,
oh+(ev.clientY-sy)
)
}
);

}

function up(){

removeEventListener("mousemove",move);
removeEventListener("mouseup",up);

}

addEventListener("mousemove",move);
addEventListener("mouseup",up);

}

const style =
tabMode
?
{
left:0,
top:0,
width:"100%",
height:"100%"
}
:
data.maximized
?
{
left:0,
top:0,
width:"100%",
height:"calc(100% - 52px)",
zIndex:data.z
}
:
{
left:data.x,
top:data.y,
width:data.width,
height:data.height,
zIndex:data.z
};

return(

<div
className="window"
style={style}
onMouseDown={()=>
focusWindow(data.id)
}
>

<div
className="windowBar"
onMouseDown={drag}
>

<div className="windowTitle">

<Icon
iconName={
data.type==="memo"
?
"Edit"
:
"Globe"
}
/>

{data.title}

</div>

{

!tabMode &&

<div className="windowBtns">

<button
className="windowBtn"
onClick={()=>{
updateWindow(
data.id,
{
minimized:true
}
);
}}
>
─
</button>

<button
className="windowBtn"
onClick={()=>{
updateWindow(
data.id,
{
maximized:
!data.maximized
}
);
}}
>
□
</button>

<button
className="windowBtn"
onClick={()=>
closeWindow(data.id)
}
>
✕
</button>

</div>

}

</div>

<div className="windowContent">

{

data.type==="memo"

?

<iframe
src="https://ayatocraft.github.io/memo"
></iframe>

:

<HomepageBuilder
windowData={data}
updateWindow={updateWindow}
setPopup={setPopup}
/>

}

</div>

{

!tabMode
&&
!data.maximized
&&

<div
className="resize"
onMouseDown={resize}
></div>

}

</div>

);

}

function HomepageBuilder({
windowData,
updateWindow,
setPopup
}){

const [title,setTitle] =
React.useState("My Homepage");

const [text,setText] =
React.useState("");

const [items,setItems] =
React.useState([]);

React.useEffect(()=>{

updateWindow(
windowData.id,
{
title
}
);

},[title]);

function addURL(){

const url =
prompt("URL");

if(!url)return;

const label =
prompt("表示テキスト");

setItems(prev=>[
...prev,
{
type:"link",
url,
label:label || url
}
]);

}

function uploadFile(file){

const url = URL.createObjectURL(file);

const baseItem = {
id:Math.random(),
url,
x:100,
y:100
};

if(file.type.startsWith("image/")){
setItems(prev=>[
...prev,
{...baseItem,type:"image"}
]);
}

else if(file.type.startsWith("video/")){
setItems(prev=>[
...prev,
{...baseItem,type:"video"}
]);
}

else{
setItems(prev=>[
...prev,
{...baseItem,type:"file",name:file.name}
]);
}

}

function publish(){

setPopup({

title:"公開",
x:300,
y:100,

content:
<PublishPopup />

});

}

return(

<div className="site">

<div className="topbar">

<div>
Homepage Builder
</div>

<div
style={{
display:"flex",
gap:"10px"
}}
>

<PrimaryButton
text="ファイル"
onClick={()=>{

setPopup({

title:"ファイル追加",
x:300,
y:120,

content:
<FilePopup
uploadFile={
uploadFile
}
/>

});

}}
/>

<PrimaryButton
text="URL"
onClick={addURL}
/>

<PrimaryButton
text="公開"
onClick={publish}
/>

</div>

</div>

<div className="header">

<div className="headerOverlay">

<input
className="headerTitleInput"
value={title}
onChange={(e)=>
setTitle(e.target.value)
}
placeholder="タイトル"
/>

</div>

</div>

<div className="editor">

<textarea
value={text}
onChange={(e)=>
setText(e.target.value)
}
placeholder="ここに入力"
></textarea>

<div className="preview">

<div
style={{
whiteSpace:"pre-wrap",
fontSize:"20px",
lineHeight:"1.8"
}}
>
{text}
</div>

{

items.map((item,i)=>{

if(item.type==="image"){

return(
<img
key={i}
src={item.url}
/>
);

}

if(item.type==="video"){

return(
<video
key={i}
src={item.url}
controls
></video>
);

}

if(item.type==="link"){

return(
<div
key={i}
style={{
marginTop:"14px"
}}
>
<a
href={item.url}
target="_blank"
style={{
color:"#0078d4",
fontSize:"18px"
}}
>
{item.label}
</a>
</div>
);

}

if(item.type==="file"){

return(
<div key={i}>
<a
href={item.url}
download={item.name}
className="downloadBtn"
>
{item.name}
</a>
</div>
);

}

})

}

</div>

</div>

</div>

);

}

function FilePopup({
uploadFile
}){

const [file,setFile] =
React.useState(null);

return(

<Stack
tokens={{
childrenGap:10
}}
>

<input
type="file"
onChange={(e)=>{
setFile(
e.target.files[0]
);
}}
/>

<PrimaryButton
text="アップロード"
onClick={()=>{
if(file){
uploadFile(file);
}
}}
/>

</Stack>

);

}

function PublishPopup(){

const [viewPassEnabled,
setViewPassEnabled] =
React.useState(false);

const [editPassEnabled,
setEditPassEnabled] =
React.useState(false);

const [viewPass,
setViewPass] =
React.useState("");

const [editPass,
setEditPass] =
React.useState("");

const [url,setUrl] =
React.useState("");

function publish(){

const code =
Math.random()
.toString(36)
.substring(2)
+
Math.random()
.toString(36)
.substring(2);

setUrl(
location.origin +
location.pathname +
"?code=" +
code
);

}

return(

<Stack
tokens={{
childrenGap:12
}}
>

<Checkbox
label="閲覧パスワードON"
checked={viewPassEnabled}
onChange={(e,v)=>
setViewPassEnabled(v)
}
/>

{

viewPassEnabled &&

<TextField
label="閲覧パスワード"
value={viewPass}
onChange={(e,v)=>
setViewPass(v || "")
}
/>

}

<Checkbox
label="編集パスワードON"
checked={editPassEnabled}
onChange={(e,v)=>
setEditPassEnabled(v)
}
/>

{

editPassEnabled &&

<TextField
label="編集パスワード"
value={editPass}
onChange={(e,v)=>
setEditPass(v || "")
}
/>

}

<PrimaryButton
text="公開"
onClick={publish}
/>

{

url &&

<TextField
label="公開URL"
value={url}
readOnly
/>

}

</Stack>

);

}

ReactDOM.createRoot(
document.getElementById("root")
).render(<App/>);

</script>

</body>
</html>
