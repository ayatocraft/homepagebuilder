<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homepage Builder Stable</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>
body{
margin:0;
font-family:"Segoe UI";
background:#f5f5f5;
}

.header{
height:160px;
background:linear-gradient(135deg,#0078d4,#00a2ff);
color:white;
display:flex;
align-items:flex-end;
padding:20px;
}

.header input{
font-size:40px;
font-weight:bold;
border:none;
background:transparent;
color:white;
outline:none;
width:100%;
}

.page{
max-width:900px;
margin:0 auto;
padding:20px;
background:white;
min-height:100vh;
}

.toolbar{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#0078d4;
color:white;
cursor:pointer;
}

.input{
width:100%;
padding:8px;
font-size:16px;
border:1px solid #ddd;
border-radius:6px;
outline:none;
margin-bottom:8px;
}

img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

a{
color:#0078d4;
word-break:break-all;
}

.urlBox{
display:flex;
gap:10px;
margin-top:10px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* =========================
   ABLY
========================= */
const ably = new Ably.Realtime(
"JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY"
);

const channel = ably.channels.get("homepage-builder");

/* =========================
   UTIL
========================= */
function getCode(){
return new URLSearchParams(location.search).get("code");
}

function saveLocal(code,data){
localStorage.setItem("page_"+code,JSON.stringify(data));
}

function loadLocal(code){
return JSON.parse(localStorage.getItem("page_"+code)||"null");
}

/* =========================
   APP
========================= */
function App(){

const code = getCode();
const isView = !!code;

const saved = code ? loadLocal(code) : null;

const [title,setTitle]=React.useState(saved?.title||"My Page");
const [blocks,setBlocks]=React.useState(saved?.blocks||[
{type:"text",value:""}
]);

const [editing,setEditing]=React.useState(!isView);
const [publicUrl,setPublicUrl]=React.useState("");

/* =========================
   Ably sync (IMPORTANT FIX)
   → 受信のみでローカル更新
========================= */
React.useEffect(()=>{

if(!code) return;

const handler = (msg)=>{
if(!msg.data) return;

saveLocal(code,msg.data);
setTitle(msg.data.title);
setBlocks(msg.data.blocks);
};

channel.subscribe("sync-"+code,handler);

return ()=>{
channel.unsubscribe("sync-"+code,handler);
};

},[]);

/* =========================
   ローカル保存（正本）
========================= */
React.useEffect(()=>{
if(!code) return;
saveLocal(code,{title,blocks});
},[title,blocks]);

/* =========================
   Eキー切替
========================= */
React.useEffect(()=>{

function onKey(e){

const el=document.activeElement;
const typing =
el &&
(el.tagName==="INPUT" || el.tagName==="TEXTAREA");

if(typing) return;

if(e.key.toLowerCase()==="e"){
setEditing(v=>!v);
}
}

window.addEventListener("keydown",onKey);
return ()=>window.removeEventListener("keydown",onKey);

},[]);

/* =========================
   BLOCK UPDATE
========================= */
function updateBlock(i,value){
const copy=[...blocks];
copy[i].value=value;
setBlocks(copy);
}

/* =========================
   ADD
========================= */
function addText(){
setBlocks([...blocks,{type:"text",value:""}]);
}

function addUrl(){
const url=prompt("URL");
if(!url) return;
setBlocks([...blocks,{type:"url",value:url}]);
}

function addImage(){
const input=document.createElement("input");
input.type="file";

input.onchange=(e)=>{
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();
reader.onload=()=>{
setBlocks([...blocks,{
type:"image",
value:reader.result
}]);
};
reader.readAsDataURL(file);
};

input.click();
}

/* =========================
   PUBLISH
========================= */
function publish(){

const newCode = code || Math.random().toString(36).slice(2);

const data = {title,blocks};

saveLocal(newCode,data);

/* Ably broadcast */
channel.publish("sync-"+newCode,data);

const url = location.origin+location.pathname+"?code="+newCode;

setPublicUrl(url);
location.search="?code="+newCode;
}

/* =========================
   VIEW MODE
========================= */
if(isView && !editing){

return(
<div>

<div className="header">
<h1>{title}</h1>
</div>

<div className="page">

{blocks.map((b,i)=>{

if(b.type==="text"){
return <div key={i}>{b.value}</div>;
}

if(b.type==="url"){
return (
<div key={i}>
<a href={b.value} target="_blank">{b.value}</a>
</div>
);
}

if(b.type==="image"){
return <img key={i} src={b.value}/>;
}

})}

</div>

</div>
);
}

/* =========================
   EDIT MODE
========================= */
return(
<div>

<div className="header">
<input
value={title}
onChange={e=>setTitle(e.target.value)}
/>
</div>

<div className="page">

<div className="toolbar">

<button onClick={addText}>テキスト</button>
<button onClick={addUrl}>URL</button>
<button onClick={addImage}>画像</button>
<button onClick={publish}>公開</button>

</div>

{blocks.map((b,i)=>{

if(b.type==="text"){
return (
<input
key={i}
className="input"
value={b.value}
onChange={e=>updateBlock(i,e.target.value)}
/>
);
}

if(b.type==="url"){
return (
<div key={i}>
<input
className="input"
value={b.value}
onChange={e=>updateBlock(i,e.target.value)}
/>

{b.value && (
<a href={b.value} target="_blank">
{b.value}
</a>
)}

</div>
);
}

if(b.type==="image"){
return <img key={i} src={b.value}/>;
}

})}

{publicUrl && (
<div className="urlBox">
<input style={{flex:1}} value={publicUrl} readOnly/>
<button onClick={()=>{
navigator.clipboard.writeText(publicUrl);
alert("コピー");
}}>
コピー
</button>
</div>
)}

</div>

</div>
);

}

ReactDOM.createRoot(document.getElementById("root"))
.render(<App/>);

</script>

</body>
</html>
